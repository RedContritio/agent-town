version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-town-postgres
    environment:
      POSTGRES_USER: agenttown
      POSTGRES_PASSWORD: agenttown
      POSTGRES_DB: agenttown
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttown"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-town-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: agent-town-server
    environment:
      - DATABASE_URL=postgres://agenttown:agenttown@postgres:5432/agenttown?sslmode=disable
      - REDIS_URL=redis:6379
      - GRPC_PORT=50051
      - HTTP_PORT=8080
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
  redis_data:
